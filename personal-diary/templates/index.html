{% extends "base.html" %}

{% block content %}
<h2>Мои записи</h2>

{% if entries %}
    <div class="entries-list">
    {% for entry in entries %}
        <div class="entry-card">
            <h3>{{ entry.title }}</h3>
            <p class="date">{{ entry.date }}</p>
            <div class="actions">
                <a href="/entry/{{ entry.id }}" class="btn">Читать</a>
                <form action="/delete/{{ entry.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить запись?')">Удалить</button>
                </form>
            </div>
        </div>
    {% endfor %}
    </div>
{% else %}
    <p>Пока нет записей. Создайте первую!</p>
{% endif %}
{% endblock %}
